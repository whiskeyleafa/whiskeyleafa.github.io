<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore.org Grid</title>
<style>
    * {
        box-sizing: border-box;
    }

    body, html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background-color: #000;
        display: flex;
        flex-direction: column;
        /* This pushes the grid to the top, leaving empty space at the bottom */
        justify-content: flex-start; 
        overflow: hidden;
    }

    .video-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); 
        /* max-content ensures rows don't stretch to fill the screen */
        grid-template-rows: repeat(3, max-content); 
        width: 100vw;
        gap: 2px; /* Your constant 2px border */
    }

    .video-wrapper {
        position: relative;
        width: 100%;
        /* Forces the height based on width regardless of screen height */
        aspect-ratio: 16 / 9;
        background: #111;
        overflow: hidden;
    }

    iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>

    <div class="video-grid">
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/wolves"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/wolves2"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/backyard"></iframe></div>
        
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/eagles"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/puppies"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/bears"></iframe></div>

        <div class="video-wrapper"><iframe src="https://ierc.co/explore/007"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/008"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/009"></iframe></div>
    </div>

</body>
<script>
// Request a wake lock to prevent dimming
let wakeLock = null;

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log('Wake Lock is active - Screen will not dim');
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
}

// Request the lock when the page loads
requestWakeLock();

// Re-request the lock if the user tabs away and comes back
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    requestWakeLock();
  }
});
</script>
    
</html>
