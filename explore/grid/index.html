<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3x3 Proportional Video Wall</title>
    <style>
        * {
            box-sizing: border-box;
        }

body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            /* Flexbox here pushes the grid to the top */
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            overflow: hidden;
        }

        /* The Grid: 3 columns, 3 rows */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, auto);    
            width: 100vw;
            height: 100vh;
            gap: 2px; /* Ultra-thin border between streams */
        }

        .video-wrapper {
           position: relative;
            width: 100%;
            /* This ensures the height is always perfectly proportional to the width */
            aspect-ratio: 16 / 9;
            background: #111;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-grid">
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/wolves"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/wolves2"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/backyard"></iframe></div>
        
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/eagles"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/puppies"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/bears"></iframe></div>

        <div class="video-wrapper"><iframe src="https://ierc.co/explore/007"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/008"></iframe></div>
        <div class="video-wrapper"><iframe src="https://ierc.co/explore/009"></iframe></div>
    </div>

</body>
<script>
// Request a wake lock to prevent dimming
let wakeLock = null;

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    console.log('Wake Lock is active - Screen will not dim');
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
}

// Request the lock when the page loads
requestWakeLock();

// Re-request the lock if the user tabs away and comes back
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    requestWakeLock();
  }
});
</script>
    
</html>
